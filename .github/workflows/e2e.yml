# E2E: full harness×skill lifecycle tests.
#
# Runs on manual trigger and every Saturday at 10:00 CET (08:00 UTC in
# summer / 09:00 UTC in winter). Tests that each harness can start under
# the omac sandbox and that an agent running on GLM-5.2-TEE (or
# claude-sonnet-5 for claude-code) can call the bundled echo-rest skill
# through the omac facade.
name: E2E

on:
  workflow_dispatch:
    inputs:
      skip_claude_code:
        description: 'Skip claude-code (the only harness billed against the real Anthropic account)'
        type: boolean
        default: false
      use_latest:
        description: 'Install each harness''s latest release for THIS RUN ONLY instead of internal/e2e/versions.go''s pin (drift-detection run; the *_version inputs below are ignored when checked)'
        type: boolean
        default: false
      opencode_version:
        description: 'Pinned opencode package spec. Overrides internal/e2e/versions.go for THIS RUN ONLY (the file itself is untouched); ignored if "use latest" is checked'
        type: string
        default: 'opencode-ai@1.17.12'
      claude_code_version:
        description: 'Pinned claude-code package spec. Overrides internal/e2e/versions.go for THIS RUN ONLY (the file itself is untouched); ignored if "use latest" is checked'
        type: string
        default: '@anthropic-ai/claude-code@2.1.197'
      codex_version:
        description: 'Pinned codex package spec. Overrides internal/e2e/versions.go for THIS RUN ONLY (the file itself is untouched); ignored if "use latest" is checked'
        type: string
        default: '@openai/codex@0.142.5'
      copilot_version:
        description: 'Pinned copilot package spec. Overrides internal/e2e/versions.go for THIS RUN ONLY (the file itself is untouched); ignored if "use latest" is checked'
        type: string
        default: '@github/copilot@1.0.68'
  schedule:
    - cron: '0 8 * * 6' # Saturdays 10:00 CEST

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ matrix.harness }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        harness: [opencode, claude-code, codex, copilot, pi]
        # codex on macOS is excluded — its Rust HTTP client is incompatible
        # with the macOS Seatbelt sandbox (stream disconnected mid-completion,
        # even with network=open). `omac start codex` on macOS fails loud;
        # --no-sandbox would disable the entire omac sandbox, leaving nothing
        # to assert against. See issue #48.
        exclude:
          - os: macos-latest
            harness: codex
    runs-on: ${{ matrix.os }}
    concurrency:
      group: e2e-${{ matrix.os }}-${{ matrix.harness }}
      cancel-in-progress: false
    env:
      SKAINET_TOKEN: ${{ secrets.SKAINET_TOKEN }}
      SKAINET_INTERNAL: ${{ secrets.SKAINET_EXTERNAL }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      E2E_HARNESS: ${{ matrix.harness }}
      # Drift-detection: install latest instead of the pinned versions below.
      # Empty (falsy) on schedule runs and on any workflow_dispatch where the
      # box isn't checked — versions.go then falls back to its pinned map.
      E2E_USE_LATEST: ${{ github.event.inputs.use_latest == 'true' && '1' || '' }}
      # Per-harness pinned-version overrides for a manual run, so a version
      # can be bumped/tested without editing internal/e2e/versions.go. Empty
      # on schedule runs; versions.go falls back to its pinned map when unset.
      # Ignored entirely when E2E_USE_LATEST is set.
      E2E_VERSION_OPENCODE: ${{ github.event.inputs.opencode_version }}
      E2E_VERSION_CLAUDE_CODE: ${{ github.event.inputs.claude_code_version }}
      E2E_VERSION_CODEX: ${{ github.event.inputs.codex_version }}
      E2E_VERSION_COPILOT: ${{ github.event.inputs.copilot_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bubblewrap (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # Ubuntu 24.04 AppArmor restricts unprivileged user namespaces.
          # Grant bwrap the userns permission so it can create sandboxes.
          sudo tee /etc/apparmor.d/bwrap > /dev/null <<'EOF'
          abi <abi/4.0>,
          /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          EOF
          sudo apparmor_parser -r /etc/apparmor.d/bwrap

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # npm/bun package downloads are a leading cause of e2e infra flakiness
      # (registry throttling, transient network errors). Cache them keyed on
      # the pinned harness versions so a version bump invalidates the cache
      # but repeated runs at the same versions reuse already-fetched packages.
      # The use_latest/*_version inputs are folded in too, so a manual
      # drift-detection or version-override run never reuses a cache keyed
      # for the versions.go-pinned versions (or vice versa).
      - name: Cache harness install packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/e2e-install-cache
          key: e2e-install-${{ runner.os }}-${{ matrix.harness }}-${{ hashFiles('internal/e2e/versions.go') }}-${{ github.event.inputs.use_latest }}-${{ github.event.inputs.opencode_version }}-${{ github.event.inputs.claude_code_version }}-${{ github.event.inputs.codex_version }}-${{ github.event.inputs.copilot_version }}
          restore-keys: |
            e2e-install-${{ runner.os }}-${{ matrix.harness }}-

      - name: Run e2e test
        id: run_e2e
        # claude-code is the only harness billed against a real external
        # Anthropic account (the others run against the internal SKAINET
        # gateway) — included by default, skippable via the workflow_dispatch
        # input above. The scheduled run always includes it. (job-level `if:`
        # can't reference `matrix` — only `github`/`inputs`/`needs`/`vars` are
        # available there — so the guard lives on this step instead.)
        if: matrix.harness != 'claude-code' || github.event.inputs.skip_claude_code != 'true'
        env:
          E2E_LOG_DIR: ${{ runner.temp }}/e2e-logs
          E2E_CACHE_DIR: ${{ runner.temp }}/e2e-install-cache
        run: |
          set -o pipefail
          max_attempts=3
          attempt=1
          while :; do
            echo "::group::e2e attempt $attempt/$max_attempts"
            if go test -tags=e2e -timeout=30m -v ./internal/e2e/ 2>&1 | tee /tmp/e2e-out.txt; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            # Only retry when no failure this attempt was classified as a real
            # regression: SANDBOX_FAIL (a security property went unenforced)
            # or AGENT_REFUSED/AGENT_PARTIAL (a model-behavior signal, not
            # infra). Every other failure path — install/build errors,
            # AGENT_NEVER_RAN, INFRA_ERROR, agent timeout — is either a
            # t.Fatalf before any assertion ran, or an infra-classified
            # assertion, and is safe to retry. This ensures a real sandbox
            # regression can never be silently masked by a retry.
            bad=$(grep -oE 'FAIL \[[^]]+\]: (SANDBOX_FAIL|AGENT_REFUSED|AGENT_PARTIAL)' /tmp/e2e-out.txt | sort -u || true)
            if [ -n "$bad" ]; then
              echo "non-infra failure — not retrying:"
              echo "$bad"
              exit 1
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "max attempts ($max_attempts) reached — giving up"
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "infra-only failure — retrying in 15s (attempt $attempt/$max_attempts)"
            sleep 15
          done

      - name: Skipped notice
        if: steps.run_e2e.outcome == 'skipped'
        run: |
          echo "## E2E (${{ matrix.harness }} / ${{ matrix.os }}): SKIPPED" >> "$GITHUB_STEP_SUMMARY"
          echo "skip_claude_code was set on this workflow_dispatch run." >> "$GITHUB_STEP_SUMMARY"

      - name: Failure classification summary
        if: always() && steps.run_e2e.outcome != 'skipped'
        run: |
          # Render a markdown table on the run-summary page so the failure
          # cause is visible by indicator without opening the full log.
          echo "## E2E failure classification (${{ matrix.harness }} / ${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Assertion | Mode | Reason |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          if grep -qE 'FAIL \[[^]]+\]: [A-Z_]+ — ' /tmp/e2e-out.txt; then
            grep -oE 'FAIL \[[^]]+\]: [A-Z_]+ — [^\\]*' /tmp/e2e-out.txt \
              | sort -u \
              | sed -E 's/FAIL \[([^]]+)\]: ([A-Z_]+) — (.*)/| `\1` | `\2` | \3 |/' \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| _all passed_ | PASS | no failures |" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Also echo to stdout so the table is visible in the raw log too.
          cat "$GITHUB_STEP_SUMMARY"

      - name: Upload session artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.harness }}-${{ matrix.os }}
          path: ${{ runner.temp }}/e2e-logs/
          if-no-files-found: ignore
          retention-days: 14
